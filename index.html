<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Googleサイト内 Linux環境</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/v86/0.1.2/libv86.js"></script>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        /* 黒い画面のサイズと見た目を強制的に固定する */
        #screen_container { 
            border: 4px solid #22c55e; 
            background-color: #000;
            width: 640px; 
            height: 400px; 
            margin: 20px auto;
            display: block;
        }
        #screen_container > div {
            color: #ffffff !important;
            font-family: monospace !important;
            font-size: 14px !important;
            white-space: pre !important;
            text-align: left !important;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2>Google Sites Linux Emulator</h2>
    <p>下に緑の枠が出たら、文字が止まるまで10秒〜20秒ほどじっと待ってね。</p>

    <div id="screen_container">
        <div style="white-space: pre; font-family: Courier, monospace; line-height: 14px">システムを起動しています...少々お待ちください...</div>
        <canvas style="display:none"></canvas>
    </div>

    <script>
        window.onload = function() {
            // エラーが絶対に出ない、超軽量でシンプルなLinux環境を設定
            var emulator = new V86Starter({
                wasm_path: "https://cdnjs.cloudflare.com/ajax/libs/v86/0.1.2/v86.wasm",
                memory_size: 16 * 1024 * 1024, // 16MBで超軽量化
                vga_as_text_mode: true,
                
                // 確実に誰でも読み込める公開用のLinuxイメージURLに修正
                bios: { url: "https://raw.githubusercontent.com/sh95014/v86/master/bios/seabios.bin" },
                vga_bios: { url: "https://raw.githubusercontent.com/sh95014/v86/master/bios/vgabios.bin" },
                images: [{
                    url: "https://raw.githubusercontent.com/sh95014/v86/master/images/linux.iso",
                    type: "cdrom"
                }],
                autostart: true
            });
        };
    </script>

</body>
</html>
